[platformio]
src_dir = .

; ── Original board (upstream baseline) ──────────────────────────────────────
[env:xiao_esp32s3]
platform = espressif32@^6.3.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

build_src_filter = +<main.cpp>

board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

; ── Standard ESP32 DevKit ─────────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32@^6.3.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv
board_build.filesystem = spiffs

[env:m5atom-echo]
platform = espressif32@^6.3.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
upload_port = /dev/tty.usbserial-*

lib_deps = 
    adafruit/Adafruit NeoPixel@^1.15.1

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_M5ATOM_ECHO

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv
board_build.filesystem = spiffs

[env:m5atom-lite]
platform = espressif32@^6.3.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
upload_port = /dev/tty.usbserial-*

lib_deps = 
    adafruit/Adafruit NeoPixel@^1.15.1

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_M5ATOM_LITE

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv
board_build.filesystem = spiffs

; ── Atom VoiceS3R (ESP32-S3-PICO-1-N8R8, 8MB flash, 8MB PSRAM) ──────────────
; USB CDC port: /dev/tty.usbmodem*  (not usbserial — it's native USB)
; Speaker: ES8311 codec via I2S — driven through M5Unified M5.Speaker.tone()
; Normal mode: Flock OUI detection only. Add -DTESTING_MODE=1 to alert on all WiFi.
[env:m5atom-voices3r]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/tty.usbmodem*

board_build.arduino.memory_type = qio_opi

lib_deps =
    m5stack/M5Unified @ ^0.2.2

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSE_M5ATOM_VOICES3R

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv
board_build.filesystem = spiffs
